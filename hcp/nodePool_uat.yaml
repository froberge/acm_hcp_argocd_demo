apiVersion: hypershift.openshift.io/v1beta1
kind: NodePool
metadata:
  name: uat-us-west-2a
  namespace: local-cluster
spec:
  arch: amd64
  clusterName: uat
  management:
    autoRepair: true
    replace:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      strategy: RollingUpdate
    upgradeType: Replace
  nodeDrainTimeout: 0s
  platform:
    aws:
      instanceProfile: uat-hl7tn-worker
      instanceType: m6a.large
      rootVolume:
        size: 120
        type: gp3
      securityGroups:
      - id: sg-0d97fe6da97e24128
      subnet:
        id: subnet-03fe43b649ed754a0
    type: AWS
  release:
    image: quay.io/openshift-release-dev/ocp-release:4.14.3-x86_64
  replicas: 1
