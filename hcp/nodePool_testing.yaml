apiVersion: hypershift.openshift.io/v1beta1
kind: NodePool
metadata:
  name: testing-us-west-2a
  namespace: local-cluster
spec:
  arch: amd64
  clusterName: testing
  management:
    autoRepair: true
    replace:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      strategy: RollingUpdate
    upgradeType: Replace
  nodeDrainTimeout: 0s
  platform:
    aws:
      instanceProfile: testing-hl7tn-worker
      instanceType: m6a.xlarge
      rootVolume:
        size: 120
        type: gp3
      securityGroups:
      - id: sg-0f191001cda0443f5
      subnet:
        id: subnet-07158b64bdadcb89c
    type: AWS
  release:
    image: quay.io/openshift-release-dev/ocp-release:4.14.3-x86_64
  replicas: 1
