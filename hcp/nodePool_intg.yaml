apiVersion: hypershift.openshift.io/v1beta1
kind: NodePool
metadata:
  name: intg-us-west-2a
  namespace: local-cluster
spec:
  arch: amd64
  clusterName: intg
  management:
    autoRepair: true
    replace:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      strategy: RollingUpdate
    upgradeType: Replace
  nodeDrainTimeout: 0s
  platform:
    aws:
      instanceProfile: intg-hl7tn-worker
      instanceType: m6a.large
      rootVolume:
        size: 120
        type: gp3
      securityGroups:
      - id: sg-0291095569438636b
      subnet:
        id: subnet-07a03273153a12895
    type: AWS
  release:
    image: quay.io/openshift-release-dev/ocp-release:4.14.3-x86_64
  replicas: 1
