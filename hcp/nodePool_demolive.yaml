apiVersion: hypershift.openshift.io/v1beta1
kind: NodePool
metadata:
  name: demolive-us-west-2a
  namespace: local-cluster
spec:
  arch: amd64
  clusterName: demolive
  management:
    autoRepair: true
    replace:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      strategy: RollingUpdate
    upgradeType: Replace
  nodeDrainTimeout: 0s
  platform:
    aws:
      instanceProfile: demolive-hl7tn-worker
      instanceType: m6a.xlarge
      rootVolume:
        size: 120
        type: gp3
      securityGroups:
      - id: sg-0d583aab2e542760d
      subnet:
        id: subnet-00119885ba0f9acf0
    type: AWS
  release:
    image: quay.io/openshift-release-dev/ocp-release:4.14.3-x86_64
  replicas: 1
