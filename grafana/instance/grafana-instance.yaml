---
# Grafana instance managed by the Grafana Community Operator v5.
#
# Key design decisions:
#
#   serviceAccountName — the pod runs as grafana-serviceaccount which has
#     cluster-monitoring-view, so it can query the Thanos Querier.
#
#   projected token volume — a short-lived (1h) OpenShift service account
#     token is mounted at /var/run/secrets/tokens/grafana-token.  The
#     GrafanaDataSource uses this file path as bearerTokenFile, so no
#     static secret is needed in Git.
#
#   label dashboards: coffeeshop — the instanceSelector on both
#     GrafanaDataSource and GrafanaDashboard uses this label to bind to
#     this specific Grafana instance.
#
#   Anonymous access (Viewer role) — convenient for demo presentations;
#     change to false and configure OAuth for production use.
#
#   Route — the operator creates an OpenShift Route automatically when
#     spec.ingress is omitted (default behaviour in v5 on OpenShift).
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: coffeeshop-grafana
  namespace: grafana-slo
  labels:
    dashboards: "coffeeshop"
    app.kubernetes.io/part-of: coffeeshop
    app.kubernetes.io/component: observability
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  config:
    auth:
      disable_login_form: "false"
    auth.anonymous:
      enabled: "true"
      org_name: Main Org.
      org_role: Viewer
    security:
      admin_user: admin
      admin_password: admin
    log:
      mode: console
      level: warn
  deployment:
    spec:
      template:
        spec:
          serviceAccountName: grafana-serviceaccount
          volumes:
            - name: grafana-token
              projected:
                sources:
                  - serviceAccountToken:
                      path: grafana-token
                      # audience must match the Thanos Querier's expected audience
                      audience: openshift
                      expirationSeconds: 3600
          containers:
            - name: grafana
              volumeMounts:
                - name: grafana-token
                  mountPath: /var/run/secrets/tokens
                  readOnly: true
