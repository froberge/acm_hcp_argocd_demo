---
# GrafanaDatasource — connects this Grafana instance to the cluster's
# Thanos Querier (openshift-monitoring).
#
# Authentication: the Grafana Community Operator v5 CRD does not have a
# top-level bearerTokenFile field in spec.datasource.  Instead we use:
#   - jsonData.httpHeaderName1: "Authorization"   — names the custom header
#   - spec.valuesFrom                             — injects "Bearer <token>"
#     from the grafana-thanos-token Secret (created once on the cluster by
#     running: oc create token grafana-serviceaccount -n grafana-slo
#              --duration=8760h | xargs -I{} oc create secret generic
#              grafana-thanos-token -n grafana-slo --from-literal="token=Bearer {}")
#
# TLS: tlsSkipVerify is true because the Thanos Querier uses a
# cluster-internal certificate signed by the OpenShift internal CA.
# For production, configure the CA bundle instead.
#
# The instanceSelector label dashboards: coffeeshop binds this datasource
# to the coffeeshop-grafana Grafana instance only.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: thanos-querier
  namespace: grafana-slo
  labels:
    app.kubernetes.io/part-of: coffeeshop
    app.kubernetes.io/component: observability
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  # allowCrossNamespaceImport is added by the operator; declaring it here
  # prevents Argo CD from seeing a diff on every reconcile loop.
  allowCrossNamespaceImport: false
  instanceSelector:
    matchLabels:
      dashboards: "coffeeshop"
  # Inject the Bearer token from the grafana-thanos-token Secret so Grafana
  # can authenticate to Thanos Querier via the custom Authorization header.
  valuesFrom:
    - targetPath: "datasource.secureJsonData.httpHeaderValue1"
      valueFrom:
        secretKeyRef:
          name: grafana-thanos-token
          key: token
  datasource:
    name: Thanos
    type: prometheus
    access: proxy
    # Internal Thanos Querier endpoint — port 9091 requires Bearer token auth.
    # Port 9092 = kube-rbac-proxy — accepts SA Bearer tokens with cluster-monitoring-view.
    # Port 9091 = oauth-proxy — requires an OpenShift user OAuth token (browser session).
    url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9092
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "30s"
      tlsSkipVerify: true
      httpMethod: GET
      # Name the custom header; the value is injected via spec.valuesFrom above.
      httpHeaderName1: "Authorization"
