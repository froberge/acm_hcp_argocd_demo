---
# OLM Subscription — installs the Grafana Community Operator v5 from the
# community-operators catalog that ships with every OpenShift cluster.
#
# Channel v5 provides the grafana.integreatly.org/v1beta1 API group used
# by the Grafana, GrafanaDataSource, and GrafanaDashboard CRs below.
#
# The operator is installed in namespace-scope (matches the OperatorGroup
# targetNamespaces above), so it only manages resources in grafana-slo.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: grafana-operator
  namespace: grafana-slo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  channel: v5
  name: grafana-operator
  source: community-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
