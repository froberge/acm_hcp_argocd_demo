---
# OperatorGroup scoped to the grafana-slo namespace.
# A single-namespace OperatorGroup means the Grafana operator only
# watches for Grafana CRs in this namespace — it does not become a
# cluster-wide operator.  This is safer and follows least-privilege.
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: grafana-operator-group
  namespace: grafana-slo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  targetNamespaces:
    - grafana-slo
