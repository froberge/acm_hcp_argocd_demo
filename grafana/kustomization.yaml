apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Resources are applied in this order by Argo CD sync waves:
#   wave 0 (default) — Namespace, OperatorGroup, Subscription
#   wave 1           — RBAC, Grafana instance
#   wave 2           — GrafanaDataSource, GrafanaDashboard
resources:
  - grafana-namespace.yaml
  - grafana-operatorgroup.yaml
  - grafana-subscription.yaml
  - grafana-rbac.yaml
  - grafana-instance.yaml
  - grafana-datasource.yaml
  - grafana-dashboard.yaml
