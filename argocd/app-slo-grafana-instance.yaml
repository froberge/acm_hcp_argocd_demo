---
# Argo CD Application — Phase 2: Grafana instance and dashboard (coffeeshop spoke)
#
# Deploys:
#   - ConfigMap with file-based datasource provisioning (Thanos Querier, port 9091)
#   - Grafana CR (with BEARER_TOKEN env var injected from Secret + datasource ConfigMap mount)
#   - GrafanaDashboard CR (9-panel SLO dashboard loaded automatically by the operator)
#   - OpenShift Route to expose the Grafana UI
#
# Datasource strategy: file-based provisioning (not GrafanaDatasource CR).
#   The GrafanaDatasource CR mechanism requires the Grafana Operator to have
#   datasources:write permission in Grafana 12+, which was unreliable.
#   File-based provisioning loads at pod startup and is not affected by RBAC.
#
# IMPORTANT — deployment order:
#   This application depends on app-slo-grafana-operator being Synced/Healthy first.
#   OLM takes ~2-3 minutes to register the grafana.integreatly.org CRDs after the
#   Subscription is created.  SkipDryRunOnMissingResource=true prevents a dry-run
#   validation failure from blocking the sync while CRDs are still registering.
#
# After deployment:
#   oc get route -n grafana-slo   # on the coffeeshop cluster — open the Grafana URL
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: slo-grafana-instance
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: coffeeshop
spec:
  project: default
  source:
    repoURL: https://github.com/froberge/acm_hcp_argocd_demo
    targetRevision: main
    path: grafana/instance
  destination:
    name: coffeeshop
    namespace: grafana-slo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - SkipDryRunOnMissingResource=true
      - ServerSideApply=true
