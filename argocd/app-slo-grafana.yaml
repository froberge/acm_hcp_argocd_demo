---
# Argo CD Application — Grafana Community Operator + SLO dashboard (coffeeshop spoke)
#
# Deploys the following resources to the coffeeshop cluster (namespace: grafana-slo):
#
#   1. Namespace grafana-slo
#   2. OperatorGroup + Subscription — installs the Grafana Community Operator v5
#      from the OpenShift community-operators catalog via OLM.
#   3. ServiceAccount + ClusterRoleBinding (cluster-monitoring-view) — allows
#      Grafana to authenticate to the cluster's Thanos Querier.
#   4. Grafana CR — deploys the Grafana pod with a projected SA token volume.
#   5. GrafanaDataSource CR — connects Grafana to Thanos Querier using the
#      projected token (no static secrets in Git).
#   6. GrafanaDashboard CR — the 9-panel SLO dashboard, loaded automatically.
#
# Resources are applied in Argo CD sync waves (0 → operator, 1 → instance/RBAC,
# 2 → datasource/dashboard) to respect OLM CRD registration timing.
#
# Access the dashboard after deployment:
#   oc get route -n grafana-slo   # on the coffeeshop cluster
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: slo-grafana-hub
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: coffeeshop
spec:
  project: default
  source:
    repoURL: https://github.com/froberge/acm_hcp_argocd_demo
    targetRevision: main
    path: grafana
  destination:
    # Deploy to the coffeeshop spoke cluster.  The Grafana operator, instance,
    # datasource, and dashboard all run on the same cluster as the SLO
    # PrometheusRules, so Thanos Querier access is purely in-cluster.
    name: coffeeshop
    namespace: grafana-slo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
