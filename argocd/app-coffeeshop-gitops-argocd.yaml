---
# Application: coffeeshop-gitops-argocd
#
# Deploys the ArgoCD instance (kind: ArgoCD) to the coffeeshop-gitops
# namespace on the coffeeshop spoke cluster, managed by the argocd-dev
# AppProject.
#
# WHY ignoreDifferences IS REQUIRED
# ----------------------------------
# The OpenShift GitOps operator (argoproj.io/v1alpha1 ArgoCD controller)
# mutates the ArgoCD CR after it is applied:
#   - It injects default sub-specs for dex, grafana, prometheus, redis,
#     server, sso, notifications, and applicationSet.
#   - It sets .spec.server.autoscale.enabled = false.
#   - It reconciles .spec.rbac.policyMatcherMode and other internal fields.
#
# These mutations are never reflected back in Git, so Argo CD on the hub
# perpetually sees a diff and marks the Application OutOfSync.
#
# The ignoreDifferences blocks below suppress those operator-managed fields
# so that only meaningful user-defined changes trigger an OutOfSync status.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coffeeshop-gitops-argocd
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/component: gitops
    app.kubernetes.io/part-of: coffeeshop
spec:
  project: argocd-dev
  source:
    repoURL: https://github.com/froberge/acm_hcp_argocd_demo
    targetRevision: main
    path: coffeeshop-gitops
  destination:
    name: coffeeshop
    namespace: coffeeshop-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  # ignoreDifferences suppresses fields that the OpenShift GitOps operator
  # injects into the ArgoCD CR after every reconciliation.  Without these
  # entries the Application permanently stays OutOfSync even though the
  # cluster state is functionally correct.
  ignoreDifferences:
    - group: argoproj.io
      kind: ArgoCD
      jqPathExpressions:
        - .spec.applicationSet
        - .spec.dex
        - .spec.grafana
        - .spec.notifications
        - .spec.prometheus
        - .spec.redis
        - .spec.server.autoscale
        - .spec.server.grpc
        - .spec.server.insecure
        - .spec.server.logFormat
        - .spec.server.logLevel
        - .spec.sso
        - .spec.ha
        - .spec.monitoring
        - .spec.extraConfig
