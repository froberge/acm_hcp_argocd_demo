---
# Placement: select all spoke clusters (every ManagedCluster that is NOT
# the hub itself).  Used by spoke-gitopscluster.yaml to register spoke
# clusters as Argo CD destinations so that the hub Argo CD instance can
# deploy Applications to them (e.g. SLO PrometheusRules).
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: spoke-placement
  namespace: openshift-gitops
spec:
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: local-cluster
              operator: NotIn
              values:
                - "true"
