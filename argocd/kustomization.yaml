apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - acm-placement-configmap.yaml
  - gitopscluster-rbac.yaml
  - argocd-hypershift-rbac.yaml
  - argocd-acm-policy-rbac.yaml
  - managedclustersetbinding.yaml
  # Hub placement + GitOpsCluster (local-cluster only)
  - placement.yaml
  - gitopscluster.yaml
  # Spoke placement + GitOpsCluster (registers spokes with hub Argo CD)
  - spoke-placement.yaml
  - spoke-gitopscluster.yaml
  - appproject.yaml
  - applicationset.yaml
  - app-acm-policies.yaml
  - app-slo-coffeeshop.yaml
  - app-slo-grafana-operator.yaml
  - app-slo-grafana-instance.yaml
