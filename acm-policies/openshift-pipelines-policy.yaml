---
# Policy: enforce OpenShift Pipelines operator installation on all spoke clusters.
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: install-openshift-pipelines
  namespace: acm-policies
  annotations:
    policy.open-cluster-management.io/standards: NIST-CSF
    policy.open-cluster-management.io/categories: PR.IP Information Protection Processes and Procedures
    policy.open-cluster-management.io/controls: PR.IP-1 Baseline Configuration
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: install-openshift-pipelines
        spec:
          remediationAction: enforce
          severity: low
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: openshift-operators
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: Subscription
                metadata:
                  name: openshift-pipelines-operator-rh
                  namespace: openshift-operators
                spec:
                  channel: latest
                  installPlanApproval: Automatic
                  name: openshift-pipelines-operator-rh
                  source: redhat-operators
                  sourceNamespace: openshift-marketplace
---
# Placement: target all managed clusters except the hub.
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: install-openshift-pipelines-placement
  namespace: acm-policies
spec:
  clusterSets:
    - default
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: local-cluster
              operator: NotIn
              values:
                - "true"
---
# PlacementBinding: link the Policy to the Placement so ACM enforces it.
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: install-openshift-pipelines-binding
  namespace: acm-policies
placementRef:
  name: install-openshift-pipelines-placement
  kind: Placement
  apiGroup: cluster.open-cluster-management.io
subjects:
  - name: install-openshift-pipelines
    kind: Policy
    apiGroup: policy.open-cluster-management.io
