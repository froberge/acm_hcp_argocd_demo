---
# Policy: enforce default-deny NetworkPolicy on all user namespaces of
# clusters labelled rhdp_type=dev.
# ACM's ConfigurationPolicy namespaceSelector creates the NetworkPolicy
# objects in every non-system namespace it discovers on the spoke cluster.
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: network-security-dev
  namespace: acm-policies
  annotations:
    policy.open-cluster-management.io/standards: NIST-CSF
    policy.open-cluster-management.io/categories: PR.PT Protective Technology
    policy.open-cluster-management.io/controls: PR.PT-3 Least Functionality
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: default-deny-network-policy
        spec:
          remediationAction: enforce
          severity: high
          # Apply to all namespaces except core system ones.
          # Glob patterns supported; each entry is ANDed with the include list.
          namespaceSelector:
            include:
              - "*"
            exclude:
              - default
              - kube-*
              - openshift
              - openshift-*
              - open-cluster-management*
              - acm-policies
              - hypershift
              - local-cluster
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: networking.k8s.io/v1
                kind: NetworkPolicy
                metadata:
                  name: default-deny-ingress
                spec:
                  podSelector: {}
                  policyTypes:
                    - Ingress
            - complianceType: musthave
              objectDefinition:
                apiVersion: networking.k8s.io/v1
                kind: NetworkPolicy
                metadata:
                  name: default-deny-egress
                spec:
                  podSelector: {}
                  policyTypes:
                    - Egress
---
# Placement: target only spoke clusters labelled rhdp_type=dev.
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: network-security-dev-placement
  namespace: acm-policies
spec:
  clusterSets:
    - default
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: local-cluster
              operator: NotIn
              values:
                - "true"
            - key: rhdp_type
              operator: In
              values:
                - dev
---
# PlacementBinding: link the Policy to the Placement so ACM enforces it.
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: network-security-dev-binding
  namespace: acm-policies
placementRef:
  name: network-security-dev-placement
  kind: Placement
  apiGroup: cluster.open-cluster-management.io
subjects:
  - name: network-security-dev
    kind: Policy
    apiGroup: policy.open-cluster-management.io
