---
# ── Policy 1: slo-infrastructure ─────────────────────────────────────────────
#
# ENFORCE on ALL spoke clusters.
# Enables OpenShift User Workload Monitoring (prerequisite for PrometheusRule
# objects in application namespaces) and ensures the coffeeshop namespace
# exists before Argo CD deploys SLO rules into it.
#
# Placement: every spoke (local-cluster != "true").
---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: slo-infrastructure
  namespace: acm-policies
  annotations:
    policy.open-cluster-management.io/standards: NIST-CSF
    policy.open-cluster-management.io/categories: DE.CM Security Continuous Monitoring
    policy.open-cluster-management.io/controls: DE.CM-1 Network Monitoring
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:

    # Enable the user workload monitoring Prometheus instance on each spoke.
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: enable-user-workload-monitoring
        spec:
          remediationAction: enforce
          severity: medium
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: cluster-monitoring-config
                  namespace: openshift-monitoring
                data:
                  config.yaml: |
                    enableUserWorkload: true

    # Ensure the coffeeshop namespace exists before the SLO PrometheusRules
    # are deployed by Argo CD.
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: ensure-coffeeshop-namespace
        spec:
          remediationAction: enforce
          severity: low
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: coffeeshop
                  labels:
                    app.kubernetes.io/part-of: coffeeshop
---
# Placement: all spoke clusters.
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: slo-infrastructure-placement
  namespace: acm-policies
spec:
  clusterSets:
    - default
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: local-cluster
              operator: NotIn
              values:
                - "true"
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: slo-infrastructure-binding
  namespace: acm-policies
placementRef:
  name: slo-infrastructure-placement
  kind: Placement
  apiGroup: cluster.open-cluster-management.io
subjects:
  - name: slo-infrastructure
    kind: Policy
    apiGroup: policy.open-cluster-management.io
---
# ── Policy 2: slo-verify-coffeeshop ──────────────────────────────────────────
#
# INFORM on the coffeeshop cluster only.
# Checks that Argo CD has successfully deployed the two SLO PrometheusRule
# objects.  It never creates them — that is Argo CD's job.  A NonCompliant
# status here means the Argo CD sync for app-slo-coffeeshop has not yet run
# or has failed.
#
# Placement: clusters whose ACM name label equals "coffeeshop".
# The name label is set automatically by ACM when the ManagedCluster is
# registered; its value matches the hosted cluster name.
---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: slo-verify-coffeeshop
  namespace: acm-policies
  annotations:
    policy.open-cluster-management.io/standards: NIST-CSF
    policy.open-cluster-management.io/categories: DE.CM Security Continuous Monitoring
    policy.open-cluster-management.io/controls: DE.CM-1 Network Monitoring
spec:
  remediationAction: inform
  disabled: false
  policy-templates:

    # Verify the availability SLO rule exists (Argo CD should have created it).
    # Only metadata is matched — we check for existence, not content.
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: verify-slo-prometheusrules
        spec:
          remediationAction: inform
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: monitoring.coreos.com/v1
                kind: PrometheusRule
                metadata:
                  name: coffeeshop-slo-availability
                  namespace: coffeeshop
            - complianceType: musthave
              objectDefinition:
                apiVersion: monitoring.coreos.com/v1
                kind: PrometheusRule
                metadata:
                  name: coffeeshop-slo-latency
                  namespace: coffeeshop
---
# Placement: coffeeshop cluster only (matched by the managed cluster name label).
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: slo-verify-coffeeshop-placement
  namespace: acm-policies
spec:
  clusterSets:
    - default
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchLabels:
            name: coffeeshop
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: slo-verify-coffeeshop-binding
  namespace: acm-policies
placementRef:
  name: slo-verify-coffeeshop-placement
  kind: Placement
  apiGroup: cluster.open-cluster-management.io
subjects:
  - name: slo-verify-coffeeshop
    kind: Policy
    apiGroup: policy.open-cluster-management.io
