---
# ── SLO Observability Policy ──────────────────────────────────────────────────
#
# This ACM Policy is split into two logical concerns:
#
#   enforce ConfigurationPolicies:
#     1. Enables OpenShift User Workload Monitoring on every spoke cluster so
#        that PrometheusRule objects in application namespaces are picked up
#        by the in-cluster Prometheus instance.
#     2. Ensures the coffeeshop namespace exists before Argo CD deploys the
#        SLO PrometheusRule objects into it.
#
#   inform ConfigurationPolicy:
#     3. Checks that Argo CD has successfully deployed the SLO PrometheusRules.
#        Never creates them (that is Argo CD's job) — only raises a compliance
#        violation in the ACM console when they are missing.
#
# IMPORTANT: the remediationAction field is intentionally omitted at the Policy
# level.  When absent, ACM honours each child ConfigurationPolicy's own
# remediationAction.  If set at the Policy level it would override every child,
# causing the inform-only verify policy to also try to CREATE the rules — which
# fails because only metadata (no spec) is provided.
#
# Target: all spoke clusters (local-cluster != "true").
---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: slo-observability
  namespace: acm-policies
  annotations:
    policy.open-cluster-management.io/standards: NIST-CSF
    policy.open-cluster-management.io/categories: DE.CM Security Continuous Monitoring
    policy.open-cluster-management.io/controls: DE.CM-1 Network Monitoring
spec:
  # remediationAction is deliberately absent here so that each embedded
  # ConfigurationPolicy controls its own action (enforce vs inform).
  disabled: false
  policy-templates:

    # ── 1. Enable user workload monitoring (enforce) ──────────────────────────
    # Sets enableUserWorkload: true in the cluster-monitoring-config ConfigMap
    # inside openshift-monitoring.  This causes the OpenShift monitoring stack
    # to deploy a second Prometheus instance dedicated to user namespaces and
    # to honour PrometheusRule objects created there.
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: enable-user-workload-monitoring
        spec:
          remediationAction: enforce
          severity: medium
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: cluster-monitoring-config
                  namespace: openshift-monitoring
                data:
                  config.yaml: |
                    enableUserWorkload: true

    # ── 2. Create the coffeeshop namespace (enforce) ──────────────────────────
    # Ensures the target namespace exists before SLO PrometheusRules are
    # deployed by Argo CD.
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: ensure-coffeeshop-namespace
        spec:
          remediationAction: enforce
          severity: low
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: coffeeshop
                  labels:
                    app.kubernetes.io/part-of: coffeeshop

    # ── 3. Verify SLO PrometheusRules exist (inform only) ────────────────────
    # remediationAction: inform — ACM will NEVER attempt to create these objects.
    # It only reports NonCompliant in the ACM console when they are absent,
    # which signals a failed or pending Argo CD sync.
    # Only metadata is specified here intentionally: we are checking for the
    # existence of the resource, not enforcing its content.
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: verify-slo-prometheusrules
        spec:
          remediationAction: inform
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: monitoring.coreos.com/v1
                kind: PrometheusRule
                metadata:
                  name: coffeeshop-slo-availability
                  namespace: coffeeshop
            - complianceType: musthave
              objectDefinition:
                apiVersion: monitoring.coreos.com/v1
                kind: PrometheusRule
                metadata:
                  name: coffeeshop-slo-latency
                  namespace: coffeeshop
---
# Placement: target all spoke clusters (i.e. not the hub).
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: slo-observability-placement
  namespace: acm-policies
spec:
  clusterSets:
    - default
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: local-cluster
              operator: NotIn
              values:
                - "true"
---
# PlacementBinding: link the Policy to the Placement.
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: slo-observability-binding
  namespace: acm-policies
placementRef:
  name: slo-observability-placement
  kind: Placement
  apiGroup: cluster.open-cluster-management.io
subjects:
  - name: slo-observability
    kind: Policy
    apiGroup: policy.open-cluster-management.io
