---
# SLI/SLO — Stability (container restart rate)
#
# SLI definition:
#   The rate of container restarts for the coffeeshop application.
#   A container restart indicates a crash or OOMKill — each one consumes
#   a portion of the stability error budget.
#   The SLI is measured as restarts per second (rate over a time window);
#   zero restarts = perfect stability.
#
# SLO target: fewer than 1 restart per hour on average over a 28-day
#             rolling window (threshold = 1/3600 restarts/second ≈ 2.78e-4).
# Error budget: the total number of allowed restarts before the SLO is
#               considered breached for the month.
#
# Metric source: kube-state-metrics (always available).
# Selector:  namespace="coffeeshop-dev", pod=~"coffeeshop-.*"
#
# Multi-burn-rate alerting:
#
#   Severity   | Burn multiplier | Short window | Long window
#   -----------|-----------------|--------------|------------
#   critical   | 14.4 ×          | 5 m          | 1 h
#   critical   |  6.0 ×          | 30 m         | 6 h
#   warning    |  1.0 ×          | 6 h          | 3 d
#
# To simulate a stability alert for the demo:
#   Inject a crash loop by setting a bad command on the deployment, or
#   simply observe naturally if the app is already restarting.
#   Alternatively, this alert fires when the pod is restarted manually
#   enough times in a short window to exceed the threshold.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: coffeeshop-slo-latency
  namespace: coffeeshop
  labels:
    app.kubernetes.io/name: coffeeshop
    app.kubernetes.io/component: slo
    role: alert-rules
spec:
  groups:

    # ── Recording rules ──────────────────────────────────────────────────────
    # Each rule computes the restart rate over a specific time window.
    # A sustained non-zero rate means the budget is being consumed.
    # Threshold = 1 restart/hour = 1/3600 s⁻¹ ≈ 0.000278 restarts/second.

    - name: coffeeshop.slo.stability:recordings
      interval: 30s
      rules:

        # Restart rate over 5 minutes
        - record: job:coffeeshop_restart_rate:rate5m
          expr: |
            sum(rate(kube_pod_container_status_restarts_total{
              namespace="coffeeshop-dev", pod=~"coffeeshop-.*"
            }[5m]))

        # Restart rate over 30 minutes
        - record: job:coffeeshop_restart_rate:rate30m
          expr: |
            sum(rate(kube_pod_container_status_restarts_total{
              namespace="coffeeshop-dev", pod=~"coffeeshop-.*"
            }[30m]))

        # Restart rate over 1 hour
        - record: job:coffeeshop_restart_rate:rate1h
          expr: |
            sum(rate(kube_pod_container_status_restarts_total{
              namespace="coffeeshop-dev", pod=~"coffeeshop-.*"
            }[1h]))

        # Restart rate over 6 hours
        - record: job:coffeeshop_restart_rate:rate6h
          expr: |
            sum(rate(kube_pod_container_status_restarts_total{
              namespace="coffeeshop-dev", pod=~"coffeeshop-.*"
            }[6h]))

        # Restart rate over 3 days
        - record: job:coffeeshop_restart_rate:rate3d
          expr: |
            sum(rate(kube_pod_container_status_restarts_total{
              namespace="coffeeshop-dev", pod=~"coffeeshop-.*"
            }[3d]))

        # Total restarts in the 28-day window — useful for dashboards.
        - record: job:coffeeshop_restart_count:increase28d
          expr: |
            sum(increase(kube_pod_container_status_restarts_total{
              namespace="coffeeshop-dev", pod=~"coffeeshop-.*"
            }[28d]))

    # ── Alerting rules ───────────────────────────────────────────────────────
    # SLO threshold = 1/3600 ≈ 0.000278 restarts/second (1 restart/hour).
    # Burn-rate multipliers are applied to this threshold.

    - name: coffeeshop.slo.stability:alerts
      rules:

        # ── Critical: fast burn ───────────────────────────────────────────────
        # Restart rate is 14.4× the sustainable rate over both a short and a
        # long window — the application is crash-looping.
        - alert: CoffeeshopStabilityCriticalFastBurn
          expr: |
            (
              job:coffeeshop_restart_rate:rate1h  > (14.4 * 0.000278)
              and
              job:coffeeshop_restart_rate:rate5m  > (14.4 * 0.000278)
            )
          for: 2m
          labels:
            severity: critical
            slo: stability
            service: coffeeshop
          annotations:
            summary: "Coffeeshop stability SLO — critical fast burn (crash loop)"
            description: >-
              The coffeeshop container is restarting at
              {{ $value | humanize }} restarts/second over the last hour.
              This is well above the SLO threshold of 1 restart/hour and
              indicates a crash loop.
            runbook_url: "https://github.com/froberge/acm_hcp_argocd_demo/blob/main/docs/demo-slo-ops.md"

        # ── Critical: slow burn ───────────────────────────────────────────────
        - alert: CoffeeshopStabilityCriticalSlowBurn
          expr: |
            (
              job:coffeeshop_restart_rate:rate6h  > (6 * 0.000278)
              and
              job:coffeeshop_restart_rate:rate30m > (6 * 0.000278)
            )
          for: 15m
          labels:
            severity: critical
            slo: stability
            service: coffeeshop
          annotations:
            summary: "Coffeeshop stability SLO — critical slow burn"
            description: >-
              The coffeeshop container restart rate has been elevated for 6
              hours ({{ $value | humanize }} restarts/second). The stability
              error budget will be exhausted within the current 28-day window.
            runbook_url: "https://github.com/froberge/acm_hcp_argocd_demo/blob/main/docs/demo-slo-ops.md"

        # ── Warning: slow burn ────────────────────────────────────────────────
        - alert: CoffeeshopStabilityWarningSlowBurn
          expr: |
            (
              job:coffeeshop_restart_rate:rate3d > (1 * 0.000278)
              and
              job:coffeeshop_restart_rate:rate6h > (1 * 0.000278)
            )
          for: 1h
          labels:
            severity: warning
            slo: stability
            service: coffeeshop
          annotations:
            summary: "Coffeeshop stability SLO — warning slow burn"
            description: >-
              The coffeeshop container restart rate over the last 3 days
              ({{ $value | humanize }} restarts/second) exceeds the SLO
              threshold. Investigate recurring restarts before the error
              budget is exhausted.
            runbook_url: "https://github.com/froberge/acm_hcp_argocd_demo/blob/main/docs/demo-slo-ops.md"
